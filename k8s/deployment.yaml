apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-model
  namespace: lab5
  labels:
    app: task-model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-model
  template:
    metadata:
      labels:
        app: task-model
    spec:
      containers:
        - name: task-model
          image: ghcr.io/l3ihs/ipr_labs_sem_2:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          envFrom:
            - configMapRef:
                name: task-model-config
          env:
            - name: TASK_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-model-secret
                  key: TASK_SECRET_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
