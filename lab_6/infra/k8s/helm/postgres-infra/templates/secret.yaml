apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ include "postgres-infra.namespace" . }}
  labels:
    {{- include "postgres-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
