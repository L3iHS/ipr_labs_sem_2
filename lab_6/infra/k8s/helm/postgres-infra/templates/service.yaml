apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "postgres-infra.namespace" . }}
  labels:
    {{- include "postgres-infra.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
