apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-model
  namespace: {{ include "task-model-app.namespace" . }}
  labels:
    {{- include "task-model-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: task-model
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-model
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: task-model
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: task-model-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-model-secret
                  key: DATABASE_URL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
