apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-model
  namespace: lab7-app
  labels:
    app: task-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-model
  template:
    metadata:
      labels:
        app: task-model
    spec:
      containers:
        - name: task-model
          image: task-model-lab7:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: task-model-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
