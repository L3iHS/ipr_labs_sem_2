name: lab7-observability

services:
  app:
    build:
      context: ./app
    container_name: lab7-task-model
    environment:
      PORT: "8080"
      TASK_DESCRIPTION: "Task from lab_7 Docker Compose"
      TASK_PRIORITY: "4"
      OTEL_SERVICE_NAME: task-model-lab7
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8080:8080"
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: lab7-prometheus
    volumes:
      - ./observability/compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - app
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: lab7-tempo
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./observability/compose/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "13200:3200"
      - "14317:4317"
      - "14318:4318"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: lab7-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "13001:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
